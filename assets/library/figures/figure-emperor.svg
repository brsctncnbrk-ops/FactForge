<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 220" width="120" height="220">
  <!-- Robed, laurel-crowned emperor silhouette v2 (fuller toga drapery, raised
       orating arm, layered hem); scales to adult or child.
       FactForge project-original asset (CC0). Same id/viewBox as v1. -->
  <g fill="currentColor">
    <!-- laurel wreath: leaf pairs around the crown -->
    <path d="M44 18 q-9 -3 -8 -13 q9 3 10 10 Z"/>
    <path d="M49 13 q-6 -5 -3 -12 q7 4 6 11 Z"/>
    <path d="M76 18 q9 -3 8 -13 q-9 3 -10 10 Z"/>
    <path d="M71 13 q6 -5 3 -12 q-7 4 -6 11 Z"/>
    <!-- head -->
    <circle cx="60" cy="27" r="13.5"/>
    <!-- neck / shoulder line -->
    <path d="M52 39 h16 l2 8 h-20 Z"/>
    <!-- toga body: broad shoulders, cinched drape, flared floor-length hem -->
    <path d="M40 47 Q60 39 80 47 L85 88 Q87 118 84 150 L90 202 Q75 212 60 212 Q45 212 30 202 L36 150 Q33 118 35 88 Z"/>
    <!-- raised orating right arm with draped sleeve -->
    <path d="M78 52 L100 40 Q104 38 105 42 L104 48 L84 62 Q80 66 76 62 Z"/>
    <path d="M84 58 Q90 74 86 90 L78 88 Q80 72 77 62 Z" fill-opacity="0.9"/>
    <!-- left arm holding scroll at waist -->
    <path d="M42 52 L32 88 Q31 94 37 95 L44 94 L50 64 Z"/>
    <rect x="30" y="88" width="22" height="7" rx="3.5"/>
    <!-- toga sash across chest -->
    <path d="M42 60 Q60 78 80 56 L82 68 Q60 92 40 74 Z" fill-opacity="0.35"/>
    <!-- hem fold shadows -->
    <path d="M44 150 L46 202 L40 200 L38 152 Z M58 154 L58 208 L52 207 L52 154 Z M74 150 L78 200 L72 202 L70 152 Z" fill-opacity="0.3"/>
  </g>
</svg>
